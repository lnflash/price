syntax = "proto3";

service PriceHistory {
  rpc ListPrices(PriceHistoryQuery) returns (PriceHistoryResponse) {}
}

message PriceHistoryQuery {
  string currency = 1;
  enum PriceRange {
    OneDay = 0;
    OneWeek = 1;
    OneMonth = 2;
    OneYear = 3;
    FiveYears = 4;
  }
  PriceRange range = 2;
}

message PriceHistoryResponse {
  repeated Tick priceHistory = 1;
}

message Tick {
  uint64 timestamp = 1;
  // ENG-317 / Phase A of float→double rollout. See price.proto for the full
  // rationale. Servers MUST populate both fields; clients SHOULD prefer
  // `price_v2` and fall back to `price` when the server has not yet been
  // upgraded. `float price = 2` will be removed in Phase B.
  float price = 2 [deprecated = true];
  double price_v2 = 3;
}
